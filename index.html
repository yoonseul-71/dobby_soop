<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>DOHYEON RESULT</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1 class="logo">DOHYEON RESULT</h1>

  <nav>
    <button onclick="showGame('LOL')">롤</button>
    <button onclick="showGame('VAL')">발로란트</button>
    <button onclick="showGame('PUBG')">배틀그라운드</button>
  </nav>
</header>

<!-- 롤 -->
<section id="LOL" class="game">
  <h2>롤</h2>

  <div class="year-buttons">
    <button onclick="showYear('LOL','2024')">2024</button>
    <button onclick="showYear('LOL','2025')">2025</button>
    <button onclick="showYear('LOL','2026')">2026</button>
  </div>

  <div id="LOL-2024" class="year"></div>
  <div id="LOL-2025" class="year hidden"></div>
  <div id="LOL-2026" class="year hidden"></div>
</section>

<!-- 발로 -->
<section id="VAL" class="game hidden">
  <h2>발로란트</h2>

  <div class="year-buttons">
    <button onclick="showYear('VAL','2024')">2024</button>
    <button onclick="showYear('VAL','2025')">2025</button>
    <button onclick="showYear('VAL','2026')">2026</button>
  </div>

  <div id="VAL-2024" class="year"></div>
  <div id="VAL-2025" class="year hidden"></div>
  <div id="VAL-2026" class="year hidden"></div>
</section>

<!-- 배그 -->
<section id="PUBG" class="game hidden">
  <h2>배틀그라운드</h2>

  <div class="year-buttons">
    <button onclick="showYear('PUBG','2024')">2024</button>
    <button onclick="showYear('PUBG','2025')">2025</button>
    <button onclick="showYear('PUBG','2026')">2026</button>
  </div>

  <div id="PUBG-2024" class="year"></div>
  <div id="PUBG-2025" class="year hidden"></div>
  <div id="PUBG-2026" class="year hidden"></div>
</section>

<!-- 입력 -->
<section class="input-box">
  <h2>전적 입력</h2>

  <select id="game">
    <option value="LOL">롤</option>
    <option value="VAL">발로</option>
    <option value="PUBG">배그</option>
  </select>

  <select id="year">
    <option value="2024">2024</option>
    <option value="2025">2025</option>
    <option value="2026">2026</option>
  </select>

  <input type="date" id="date">
  <input type="text" id="type" placeholder="내전 종류">
  <input type="text" id="img" placeholder="이미지 URL">
  <input type="text" id="kda" placeholder="K/D/A">
  <input type="text" id="result" placeholder="W/L/W">

  <button onclick="addMatch()">추가</button>
</section>

<script src="script.js"></script>
</body>
</html>
