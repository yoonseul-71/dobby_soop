<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>DOHYEON RESULT</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">DOHYEON RESULT</div>

  <!-- 🔴 이건 그대로 유지 -->
  <nav>
    <button onclick="showPage('LOL')">롤</button>
    <button onclick="showPage('VAL')">발로란트</button>
    <button onclick="showPage('PUBG')">배틀그라운드</button>
  </nav>
</header>

<!-- 롤 -->
<section id="LOL" class="page">
  <h2>롤</h2>

  <div class="buttons">
    <button onclick="showYear('LOL','2024')">2024</button>
    <button onclick="showYear('LOL','2025')">2025</button>
    <button onclick="showYear('LOL','2026')">2026</button>
  </div>

  <div id="LOL-2024" class="grid"></div>
  <div id="LOL-2025" class="grid hidden"></div>
  <div id="LOL-2026" class="grid hidden"></div>
</section>

<!-- 발로 -->
<section id="VAL" class="page hidden">
  <h2>발로란트</h2>

  <div class="buttons">
    <button onclick="showYear('VAL','2024')">2024</button>
    <button onclick="showYear('VAL','2025')">2025</button>
    <button onclick="showYear('VAL','2026')">2026</button>
  </div>

  <div id="VAL-2024" class="grid"></div>
  <div id="VAL-2025" class="grid hidden"></div>
  <div id="VAL-2026" class="grid hidden"></div>
</section>

<!-- 배그 -->
<section id="PUBG" class="page hidden">
  <h2>배틀그라운드</h2>

  <div class="buttons">
    <button onclick="showYear('PUBG','2024')">2024</button>
    <button onclick="showYear('PUBG','2025')">2025</button>
    <button onclick="showYear('PUBG','2026')">2026</button>
  </div>

  <div id="PUBG-2024" class="grid"></div>
  <div id="PUBG-2025" class="grid hidden"></div>
  <div id="PUBG-2026" class="grid hidden"></div>
</section>

<script src="script.js"></script>
</body>
</html>
